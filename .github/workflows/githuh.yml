name: GitHub Readme Stats

on:
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI
  schedule:
    - cron: '0 0 * * *'  # Chạy 1 lần/ngày lúc 00:00 UTC
  push:
    branches: [main, master]  # Tự động chạy khi push lên main (tùy chọn)

permissions:
  contents: write  # Cho phép commit ảnh vào repository

jobs:
  update-cards:
    runs-on: ubuntu-latest
    name: Update GitHub Stats Cards
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p profile

      # ========== STATS CARDS ==========
      - name: Generate stats (light mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: |
            username=${{ github.repository_owner }}
            &show_icons=true
            &line_height=28
            &hide_border=true
            &card_width=347
            &include_all_commits=true
            &role=owner,collaborator
            &show=reviews,discussions_answered
            &hide_rank=true
            &exclude_repo=github-readme-stats
            &theme=default
          path: profile/stats-light.svg
          token: ${{ secrets.PAT }}

      - name: Generate stats (dark mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: |
            username=${{ github.repository_owner }}
            &show_icons=true
            &line_height=28
            &hide_border=true
            &card_width=347
            &include_all_commits=true
            &role=owner,collaborator
            &show=reviews,discussions_answered
            &hide_rank=true
            &exclude_repo=github-readme-stats
            &theme=dark
            &bg_color=000000
          path: profile/stats-dark.svg
          token: ${{ secrets.PAT }}

      # ========== TOP LANGUAGES CARDS ==========
      - name: Generate top languages (light mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: |
            username=${{ github.repository_owner }}
            &layout=compact
            &langs_count=12
            &hide_border=true
            &role=owner,collaborator
            &theme=default
          path: profile/top-langs-light.svg
          token: ${{ secrets.PAT }}

      - name: Generate top languages (dark mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: |
            username=${{ github.repository_owner }}
            &layout=compact
            &langs_count=12
            &hide_border=true
            &role=owner,collaborator
            &theme=dark
            &bg_color=000000
          path: profile/top-langs-dark.svg
          token: ${{ secrets.PAT }}

      # ========== STREAK CARDS ==========
      - name: Generate streak (light mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: streak-stats
          options: |
            username=${{ github.repository_owner }}
            &hide_border=true
            &theme=default
          path: profile/streak-light.svg
          token: ${{ secrets.PAT }}

      - name: Generate streak (dark mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: streak-stats
          options: |
            username=${{ github.repository_owner }}
            &hide_border=true
            &theme=dark
            &bg_color=000000
          path: profile/streak-dark.svg
          token: ${{ secrets.PAT }}

      # ========== WAKATIME CARDS (nếu dùng WakaTime) ==========
      # Bỏ comment nếu bạn có tài khoản WakaTime
      # - name: Generate wakatime (light mode)
      #   uses: readme-tools/github-readme-stats-action@v1
      #   with:
      #     card: wakatime
      #     options: |
      #       username=${{ github.repository_owner }}
      #       &hide_border=true
      #       &theme=default
      #       &layout=compact
      #       &langs_count=10
      #     path: profile/wakatime-light.svg
      #     token: ${{ secrets.PAT }}

      # - name: Generate wakatime (dark mode)
      #   uses: readme-tools/github-readme-stats-action@v1
      #   with:
      #     card: wakatime
      #     options: |
      #       username=${{ github.repository_owner }}
      #       &hide_border=true
      #       &theme=dark
      #       &bg_color=000000
      #       &layout=compact
      #       &langs_count=10
      #     path: profile/wakatime-dark.svg
      #     token: ${{ secrets.PAT }}

      # ========== COMMIT AND PUSH ==========
      - name: Commit and push generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: update GitHub stats cards [skip ci]"
          git push
